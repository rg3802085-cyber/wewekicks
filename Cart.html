<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart | WEWE KICKS</title>
    <link rel="stylesheet" href="Style6.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-area">
            <img src="elements/logo.png" alt="WEWE KICKS Logo" class="logo">
            <div class="logo-text">
                <h1>WE WE KICKS</h1>
                <p>Walk like a king</p>
            </div>
        </div>
        <nav class="top-nav">
            <a href="Stock.html">Keep Shopping</a>
        </nav>
    </header>

    <main class="cart-container">
<h1>Shopping Cart</h1>
    <div id="cart-items-list">
        </div>
    
    <div class="cart-summary">
        <h3>Total: $<span id="total-price">0.00</span></h3>
        <div class="cart-actions">
            <button id="clear-cart-btn" class="secondary-btn">Clear Cart</button>
            <button id="checkout-btn" class="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>
    </main>

    <script src="ButtonPress.Js"></script>
</body>
</html>
