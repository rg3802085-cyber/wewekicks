<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEWE KICKS | Contact Us</title>
    <link rel="stylesheet" href="Styles2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-area">
            <img src="elements/logo.png" alt="WEWE KICKS Logo" class="logo">
            <div class="logo-text">
                <h1>WE WE KICKS</h1>
                <p>Walk like a king</p>
            </div>
        </div>
        <nav class="top-nav">
            <a href="Home.html">Home</a>
            <a href="Stock.html">Stock</a>
            <a href="Staff.html">Staff</a>
            <a href="About.html">About us</a> 
            <a href="Cart.html" class="cart-link">Cart 🛒</a>

    </header>

    <main class="contact-container">
        <h1>Contact Us</h1>
        <p class="subtitle">Any questions or remarks? Just write us a message and we will help! :)</p>

        <form class="contact-form">
            <div class="form-row">
                <div class="input-group">
                    <label>Email:</label>
                    <input type="email" placeholder="enter email...">
                </div>
                <div class="input-group">
                    <label>Leave Remark!</label>
                    <textarea placeholder="Enter Remark... Please be Respectful!"></textarea>
                </div>
            </div>
            <button type="submit" class="submit-btn">SUBMIT REMARK</button>
        </form>

        <div class="info-grid">
            <div class="info-item">
                <i class="fab fa-whatsapp"></i> Phone: 666-3951
            </div>
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i> Location: Corozal
            </div>
            <div class="info-item">
                <i class="fab fa-instagram"></i> Instagram: Wewe_kicks
            </div>
            <div class="info-item">
                <i class="fab fa-facebook"></i> Facebook: Wewe Kicks
            </div>
        </div>
    </main>
